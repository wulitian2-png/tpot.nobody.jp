<td align="left" width="320"><font size="-2">「時に人は、冗談と言ってみたくなるもので。<br/>
<br/>
            　而してタチの悪い冗談は、得てして地雷を踏んづける」</font><br/>
<br/>
<br/>
</td>
<td align="right" width="320"></td>
</tr>
<tr>
<td></td>
<td align="right"><font size="-2">「好きだからこそ、隣にいるのは誰よりも自分じゃなきゃ嫌なんだ。<br/>
<br/>
            子供っぽいかもしれないけれど、いつでも精一杯です」</font><br/>
<br/>
<br/>
</td>
</tr>
<tr>
<td><font size="-2">「何においても、アナタで一杯なんだって思い知らされる。<br/>
<br/>
            小さく呟いた声が雨にかき消されて、脆く溶けていく・・・」</font><br/>
<br/>
<br/>
</td>
<td></td>
</tr>
<tr>
<td></td>
<td align="right"><font size="-2">「真っ赤な顔を隠して、照れ隠しのためにそっぽを向いた。<br/>
<br/>

<br/>
<br/>
